services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-waterchugger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpassword}
      POSTGRES_DB: ${POSTGRES_DB:-waterchugger}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bot:
    build:
      context: .
      target: runtime
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-waterchugger}:${POSTGRES_PASSWORD:-localpassword}@db:5432/${POSTGRES_DB:-waterchugger}
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && exec python main.py"]
    restart: unless-stopped

  test-db:
    image: postgres:16
    profiles: ["test"]
    environment:
      POSTGRES_USER: waterchugger_test
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: waterchugger_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U waterchugger_test -d waterchugger_test"]
      interval: 2s
      timeout: 5s
      retries: 15
    tmpfs:
      - /var/lib/postgresql/data

  test:
    build:
      context: .
      target: test
    profiles: ["test"]
    environment:
      TELEGRAM_BOT_TOKEN: 123456:test-token
      DATABASE_URL: postgresql+asyncpg://waterchugger_test:testpassword@test-db:5432/waterchugger_test
      TEST_DATABASE_URL: postgresql+asyncpg://waterchugger_test:testpassword@test-db:5432/waterchugger_test
    depends_on:
      test-db:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && python -m pytest -q"]

volumes:
  postgres_data:
